services:
  dlshogi:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: dlshogi-inference
    ports:
      - "8000:8000"
    volumes:
      - ../app:/workspace/app
      - ../models:/workspace/models:ro
    environment:
      - DLSHOGI_MODEL_PATH=${DLSHOGI_MODEL_PATH:-}
      - DLSHOGI_NETWORK=${DLSHOGI_NETWORK:-resnet10_swish}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
